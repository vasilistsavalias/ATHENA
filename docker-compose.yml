version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: arch_eval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./services/api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/arch_eval
      APP_SHARED_USERNAME: archaeologist
      APP_SHARED_PASSWORD: change-me
      SESSION_SECRET: change-me-session-secret
      ADMIN_EXPORT_SECRET: change-me-admin-secret
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./services/api/data:/app/data

  frontend:
    build:
      context: ./services/web
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_STUDY_TITLE: Ancient Greek Restoration Expert Evaluation
      NEXT_PUBLIC_BLOCK_A_COUNT: "25"
      NEXT_PUBLIC_BLOCK_B_COUNT: "15"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./services/web:/app
      - /app/node_modules

volumes:
  postgres_data:
